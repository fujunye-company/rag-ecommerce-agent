version: "3.9"

services:
  backend:
    build: ../apps/backend
    container_name: shopping-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://shopping:shopping123@postgres:5432/shopping_agent
      - QDRANT_URL=http://qdrant:6333
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    env_file:
      - env/.env.docker
    volumes:
      - model_cache:/root/.cache
      - ../apps/backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 300s

  postgres:
    image: postgres:16
    container_name: shopping-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping123
      POSTGRES_DB: shopping_agent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shopping_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shopping-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  qdrant_storage:
  model_cache:
